<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国旅游景点 - 探索美丽中国</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">


        <style>
      #china-map {
        width: 1000px;
        height: 800px;
        position: absolute;
        left: calc(50% - 500px);
        top: -50px;
      }
    </style>
    <script
      type="text/javascript"
      src="https://unpkg.com/echarts/dist/echarts.min.js"
    ></script>
    <script type="text/javascript" src="./echarts-china-map-master/js/map/china.js"></script>

    <!-- Tailwind CSS 配置 -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36BFFA',
                        accent: '#FF7D00',
                        neutral: '#F5F7FA',
                        dark: '#1D2129',
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .map-container {
                @apply relative mx-auto bg-white rounded-2xl shadow-xl overflow-hidden transition-all duration-300;
            }
            .nav-link {
                @apply text-dark hover:text-primary transition-colors duration-200 font-medium;
            }
            .btn-primary {
                @apply bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg;
            }
            .card-hover {
                @apply transition-all duration-300 hover:shadow-xl hover:-translate-y-1;
            }
        }
        .aspect-\[16\/9\] {
    aspect-ratio: 13 / 9;
}
        canvas{
        top:-100px;}
    </style>
</head>
<body class="bg-gradient-to-br from-neutral to-white min-h-screen font-inter text-dark">
    <!-- 导航栏 -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm transition-all duration-300">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-map-o text-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-primary">中国旅游景点--携程旅行</h1>
            </div>



            <div class="flex items-center space-x-4">
                <button class="md:hidden text-dark hover:text-primary transition-colors duration-200">
                    <i class="fa fa-bars text-xl"></i>
                </button>

            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 页面标题 -->
        <div class="text-center mb-10">
            <h2 class="text-[clamp(1.8rem,4vw,2.5rem)] font-bold text-dark mb-3">探索中国美丽景点</h2>

        </div>


<div class="map-container w-full max-w-5xl aspect-[16/9]">
  <button id="back" style="display: none">返回全国</button>
    <div id="china-map"></div>
    <script>
      var myChart = echarts.init(document.getElementById("china-map"));
      var oBack = document.getElementById("back");
      var provincesText = [
        "上海", "河北", "山西", "内蒙古", "辽宁", "吉林", "黑龙江", "江苏", "浙江", "安徽", "福建", "江西", "山东", "河南", "湖北", "湖南", "广东", "广西", "海南", "四川", "贵州", "云南", "西藏", "陕西", "甘肃", "青海", "宁夏", "新疆", "北京", "天津", "重庆", "香港", "澳门",
      ];
      oBack.onclick = function () {
        loadMap("china", "");
        oBack.style.display = "none";
        document.getElementById('province-cluster-view').innerHTML = '';
      };
      loadMap("china", "");
      // 加载地图
      function loadMap(mapType, name) {
        var option = {
          title: {
            text: name || mapType,
            left: "center",
          },
          series: [
            {
              name: name || mapType,
              type: "map",
              mapType,
              roam: false,
              itemStyle: {
                normal: {
                  label: {
                    show: true,
                    textStyle: {
                      color: "rgba(255,255,255,0)",
                    },
                  },
                },
              },
              aspectScale: mapType === "china" ? 0.75 : 1,
              top: "10%",
            },
          ],
        };
        myChart.clear();
        myChart.setOption(option);
        myChart.off("click");
        if (mapType === "china") {
          myChart.on("click", function (param) {
            var province = param.name;
            if (provincesText.includes(province)) {
              oBack.style.display = "block";
              loadMap(province, province);
              loadProvinceClusterData(province);
            } else {
              myChart.clear();
              oBack.style.display = "block";
            }
          });
        } else {
          myChart.on("dblclick", function () {
            loadMap("china", "");
            document.getElementById('province-cluster-view').innerHTML = '';
          });
        }
      }
      // 加载并展示省份聚类数据
      function loadProvinceClusterData(province) {
        fetch(`./cluster_data/${province}_cluster_data.json`)
          .then(res => res.json())
          .then(data => {
            renderProvinceClusterView(province, data);
          })
          .catch(() => {
            document.getElementById('province-cluster-view').innerHTML = `<div class='text-center text-red-500 mt-8'>未找到${province}的聚类数据</div>`;
          });
      }
      // 渲染聚类数据到页面
      function renderProvinceClusterView(province, data) {
        let html = `<div class='mt-10 mb-10 bg-white rounded-xl shadow-lg p-6'>`;
        html += `<h2 class='text-2xl font-bold mb-4 text-primary text-center'>${province}景点聚类可视化</h2>`;
        html += `<div class='mb-4 text-center text-gray-600'>共${data.total_attractions}个景点，${data.cluster_count}个聚类</div>`;
        html += `<div class='grid grid-cols-1 md:grid-cols-2 gap-6'>`;
        data.clusters.forEach((cluster, idx) => {
          html += `<div class='border rounded-lg p-4 mb-4'>`;
          html += `<div class='flex items-center mb-2'>`;
          html += `<span class='font-bold text-lg text-blue-700 mr-2'>簇${cluster.cluster_id}</span>`;
          html += `<span class='text-sm text-gray-500'>代表性标签：</span><span class='text-sm text-orange-600'>${cluster.representative_tags || '无'}</span>`;
          html += `</div>`;
          if (data.wordcloud_images && data.wordcloud_images[idx]) {
            html += `<img src='${data.wordcloud_images[idx]}' alt='词云' class='w-full h-32 object-contain mb-2' loading='lazy' />`;
          }
          html += `<div class='text-sm text-gray-600 mb-1'>景点数量：${cluster.attraction_count}</div>`;
          html += `<details><summary class='cursor-pointer text-blue-500'>景点列表</summary><ul class='list-disc pl-5'>`;
          cluster.attractions.slice(0, 10).forEach(attraction => {
            html += `<li class='mb-1'><span class='font-semibold'>${attraction.name}</span> <span class='text-gray-400'>(${attraction.location})</span> <span class='text-yellow-700'>热度:${attraction.popularity}</span> <span class='text-gray-500'>标签:${attraction.tags}</span></li>`;
          });
          if (cluster.attractions.length > 10) {
            html += `<li class='text-gray-400'>……共${cluster.attractions.length}个景点</li>`;
          }
          html += `</ul></details>`;
          html += `</div>`;
        });
        html += `</div></div>`;
        document.getElementById('province-cluster-view').innerHTML = html;
      }
    </script>
</div>
<!-- 新增：省份聚类可视化展示区 -->
<div id="province-cluster-view" class="max-w-5xl mx-auto"></div>

        <!-- 热门景点推荐 -->
        <div class="mt-16">
            <h3 class="text-2xl font-bold text-center mb-8">热门景点推荐</h3>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 景点卡片 1 -->
                <div class="bg-white rounded-xl shadow-md overflow-hidden card-hover">
                    <div class="h-48 overflow-hidden">
                        <img src="./img/wct.png" alt="五彩滩" class="w-full h-full object-cover transition-transform duration-500 hover:scale-110" />
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-3">
                            <h4 class="font-bold text-lg">五彩滩</h4>
                            <span class="bg-yellow-100 text-yellow-800 text-xs font-medium px-2.5 py-0.5 rounded-full">新疆</span>
                        </div>
                        <p class="text-slate-600 text-sm mb-4">有典型的雅丹地貌，岩石因含多种矿物质而呈现五彩斑斓的颜色</p>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center">
                                <i class="fa fa-star text-yellow-400 mr-1"></i>
                                <span class="text-sm font-medium">4.4 (1,664 评价)</span>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- 景点卡片 2 -->
                <div class="bg-white rounded-xl shadow-md overflow-hidden card-hover">
                    <div class="h-48 overflow-hidden">
                        <img src="./img/gugong.png" alt="故宫" class="w-full h-full object-cover transition-transform duration-500 hover:scale-110" />
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-3">
                            <h4 class="font-bold text-lg">故宫博物馆</h4>
                            <span class="bg-yellow-100 text-yellow-800 text-xs font-medium px-2.5 py-0.5 rounded-full">北京</span>
                        </div>
                        <p class="text-slate-600 text-sm mb-4">世界上现存规模最大、保存最完整的木质宫殿建筑群，珍藏着 186 万余件承载中华文明的稀世瑰宝。</p>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center">
                                <i class="fa fa-star text-yellow-400 mr-1"></i>
                                <span class="text-sm font-medium">4.8 (181,458 评价)</span>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- 景点卡片 3 -->
                <div class="bg-white rounded-xl shadow-md overflow-hidden card-hover">
                    <div class="h-48 overflow-hidden">
                        <img src="./img/jzg.png" alt="九寨沟风" class="w-full h-full object-cover transition-transform duration-500 hover:scale-110" />
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-3">
                            <h4 class="font-bold text-lg">九寨沟风景区</h4>
                            <span class="bg-yellow-100 text-yellow-800 text-xs font-medium px-2.5 py-0.5 rounded-full">四川</span>
                        </div>
                        <p class="text-slate-600 text-sm mb-4">有 "童话世界""水景之王" 的美誉，拥有丰富的动植物资源和浓郁的民族风情</p>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center">
                                <i class="fa fa-star text-yellow-400 mr-1"></i>
                                <span class="text-sm font-medium">4.7 (41,096 评价)</span>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-dark text-white mt-20">
        <div class="container mx-auto px-4 py-12">


            <div class="border-t border-slate-800 mt-8 pt-8 text-center text-slate-500 text-sm">
                <p>© 数据来源：携程旅游.</p>
            </div>
        </div>
    </footer>


</body>
</html>
